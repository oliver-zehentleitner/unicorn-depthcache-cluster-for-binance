name: Bug report
description: Report a bug with this UNICORN Binance DepthCache Cluster.
labels: bug
assignees:
  - oliver-zehentleitner
body:
  - type: markdown
    attributes:
      value: | 
        Please post here only issues concerning this repository and follow the [Issue-Guidelines](https://github.com/oliver-zehentleitner/unicorn-binance-suite/wiki/Issue-Guidelines). 
        
        Most of these fields are not mandatory, but please provide as much information as possible.

  - type: checkboxes
    id: Confirmation
    attributes:
      label: Solution to Issue cannot be found in the documentation or other Issues and also occurs in the latest version of this UNICORN Binance DepthCache Cluster.
      description: |
        I have searched for other Issues with the same problem or similar feature requests and have looked in the documentation. This issue also affects the latest version of this library.
      options:
        - label: I checked the documentation and other Issues. I am using the latest version of this UNICORN Binance DepthCache Cluster.
          required: true

  - type: textarea
    id: Version
    attributes:
      label: Used version
      description: |
        Please control what version you are using!
    validations:
      required: true

  - type: dropdown
    id: Python
    attributes:
      label: Python version?
      description: |
        In which Python version is the code executed?
      options:
        - Python3.14
        - Python3.13
        - Python3.12
    validations:
      required: true

  - type: dropdown
    id: Endpoint
    attributes:
      label: Used endpoint?
      description: |
        To which endpoint do you connect?
      options:
        - concerns all
        - binance.com
        - binance.com-futures
        - binance.com-futures-testnet
        - binance.com-testnet
        - binance.us
    validations:
      required: true

  - type: textarea
    id: Issue
    attributes:
      label: Issue
      description: |
        Please describe the issue you are experiencing:
    validations:
      required: true
