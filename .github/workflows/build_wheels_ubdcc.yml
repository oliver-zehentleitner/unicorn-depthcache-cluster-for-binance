name: Build and Publish GH+PyPi (ubdcc)

on:
  workflow_dispatch:
    branches:
      - master

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - name: Checkout specific directory
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.ref }}
          path: ubdcc
          sparse-checkout: 'packages/ubdcc/'

      - name: Move directory contents
        run: |
          mv ubdcc/packages/ubdcc/* ./
          rm -rf ubdcc

      - name: ls -l
        run: ls -l

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: dist/*

  Release:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      discussions: write
      id-token: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Please read the [CHANGELOG](https://oliver-zehentleitner.github.io/unicorn-binance-depth-cache-cluster/changelog.html) for further information.
          discussion_category_name: releases
          draft: false
          files: |
            dist/*.tar.gz
            dist/*.whl
          generate_release_notes: true
          name: ubdcc
          prerelease: false
          tag_name: 0.2.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PyPi Release
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
