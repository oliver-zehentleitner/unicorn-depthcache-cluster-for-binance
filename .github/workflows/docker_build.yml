name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (must match an existing PyPI release)'
        required: true
        type: string
        default: '0.3.3'

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [ubdcc-dcn, ubdcc-mgmt, ubdcc-restapi]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin PyPI version in requirements
        run: |
          image="${{ matrix.image }}"
          pkg="$(echo "$image" | tr '-' '_')"
          echo "${image}==${{ inputs.version }}" > "container/generic_loader/requirements-${pkg}.txt"
          cat "container/generic_loader/requirements-${pkg}.txt"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: container/generic_loader/Dockerfile.${{ matrix.image }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/oliver-zehentleitner/${{ matrix.image }}:${{ inputs.version }}
            ghcr.io/oliver-zehentleitner/${{ matrix.image }}:latest
