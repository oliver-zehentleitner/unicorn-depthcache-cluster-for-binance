apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: ubdcc-restapi
  namespace: ubdcc
  annotations:
    author: oliver-zehentleitner
spec:
  serviceName: ubdcc-restapi
  replicas: 3
  selector:
    matchLabels:
      app: ubdcc-restapi
  template:
    metadata:
      labels:
        app: ubdcc-restapi
      annotations:
        author: oliver-zehentleitner
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: ubdcc-restapi
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: ubdcc-restapi
          image: ghcr.io/oliver-zehentleitner/ubdcc-restapi:0.8.0
          ports:
            - name: rest-private
              containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /test
              port: rest-private
            initialDelaySeconds: 40
          livenessProbe:
            httpGet:
              path: /test
              port: rest-private
            initialDelaySeconds: 40
