apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ubdcc-mgmt
  namespace: ubdcc
  annotations:
    author: oliver-zehentleitner
spec:
  serviceName: "ubdcc-mgmt"
  replicas: 1
  selector:
    matchLabels:
      app: ubdcc-mgmt
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ubdcc-mgmt
      annotations:
        author: oliver-zehentleitner
    spec:
      containers:
        - name: ubdcc-mgmt
          image: ghcr.io/oliver-zehentleitner/ubdcc-mgmt:0.8.0
          ports:
            - name: rest-private
              containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
