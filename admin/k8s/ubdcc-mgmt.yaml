apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ubdcc-mgmt
  namespace: ubdcc
  annotations:
    author: oliver-zehentleitner
spec:
  serviceName: "ubdcc-mgmt"
  replicas: 1
  selector:
    matchLabels:
      app: ubdcc-mgmt
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ubdcc-mgmt
      annotations:
        author: oliver-zehentleitner
    spec:
      containers:
        - name: ubdcc-mgmt
          image: i018oau9.c1.de1.container-registry.ovh.net/library/ubdcc-mgmt@sha256:aa28458eb78c70be40592f835928193de14f7bf4ee8634406c5a829ab5582a75
          ports:
            - name: rest-private
              containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
